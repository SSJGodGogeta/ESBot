name: .NET Core Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
      Solution_Name: ESBot                         # Replace with your solution name, i.e. MyWpfApp.sln.
      Build_Directory: Build 
      DOTNET_VERSION: 9.0.x

jobs:

  test:
    runs-on: ubuntu-latest

    outputs:
      passed: ${{ steps.testresults.outputs.passed }}
      failed: ${{ steps.testresults.outputs.failed }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # Execute all unit tests in the solution
    - name: Execute unit tests
      run: dotnet test --logger "trx;LogFileName=test_results.trx"

    - name: Parse test results
      id: testresults
      run: |
        PASSED=$(grep -oP 'passed="\K[0-9]+' **/*.trx | awk '{s+=$1} END {print s}')
        FAILED=$(grep -oP 'failed="\K[0-9]+' **/*.trx | awk '{s+=$1} END {print s}')
        
        echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
        echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT

  build:
    needs: test
    runs-on: ubuntu-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on                # Replace with the path to your Wap project, i.e. MyWpf.App.Package\MyWpfApp.Package.wapproj.
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build .NET API
      run: dotnet build --no-restore --configuration Release
      
    - name: Publish .NET API
      run: dotnet publish --output ./publish --no-build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: api-build
        path: ./publish

  notification:
      needs: [test, build]  # ← Wartet auf BEIDE Jobs!
      if: always()  # ← Läuft IMMER (auch bei Fehlern)
  
      runs-on: ubuntu-latest  # For a list of available runner types, refer to
                               # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on                # Replace with the path to your Wap project, i.e. MyWpf.App.Package\MyWpfApp.Package.wapproj.
      steps:
      - name: Calculate duration
        id: duration
        run: |
          START=$(date -d "${{ github.event.head_commit.timestamp }}" +%s)
          END=$(date +%s)
          DIFF=$((END-START))
          echo "duration=${DIFF}s" >> $GITHUB_OUTPUT
      
      - name: Discord webhook success
        if: success()
        uses: tsickert/discord-webhook@v5.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-title: "⚒️ Build Status"
          embed-color: 0x00ff00
          embed-timestamp: ${{ github.event.head_commit.timestamp }}
          embed-description: |
            **Status:** ✅ Erfolgreich
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Autor:** ${{ github.actor }}
            **Tests:** ${{ needs.test.outputs.passed }} passed / ${{ needs.test.outputs.failed }} failed
            **Test Job:** ${{ needs.test.result }}
            **Build Job:** ${{ needs.build.result }}
            **Dauer:** ${{ steps.duration.outputs.duration }}
            **Trigger:** ${{ github.event_name }}
            **Runner:** ${{ runner.os }}
            **.NET:** ${{ env.DOTNET_VERSION }}
            **Run:** [Details anzeigen](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Discord webhook failure
        if: failure()
        uses: tsickert/discord-webhook@v5.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-title: "⚒️ Build Status"
          embed-color: 0xff0000
          embed-timestamp: ${{ github.event.head_commit.timestamp }}
          embed-description: |
            **Status** ❌ Fehlgeschlagen
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Autor:** ${{ github.actor }}
            **Tests:** ${{ needs.test.outputs.passed }} passed / ${{ needs.test.outputs.failed }} failed
            **Test Job:** ${{ needs.test.result }}
            **Build Job:** ${{ needs.build.result }}
            **Dauer:** ${{ steps.duration.outputs.duration }}
            **Trigger:** ${{ github.event_name }}
            **Runner:** ${{ runner.os }}
            **.NET:** ${{ env.DOTNET_VERSION }}
            **Run:** [Details anzeigen](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
