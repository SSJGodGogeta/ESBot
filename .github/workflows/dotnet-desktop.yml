name: .NET Core Build and Test

on:
  pull_request:
    branches: [ "master" ]

env:
      Solution_Name: ESBot                         # Replace with your solution name, i.e. MyWpfApp.sln.
      Build_Directory: Build 
      DOTNET_VERSION: 9.0.x
      CONFIGURATION: Release

jobs:

  test:
    runs-on: ubuntu-latest

    outputs:
      passed: ${{ steps.testresults.outputs.passed }}
      failed: ${{ steps.testresults.outputs.failed }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # Execute all unit tests in the solution
    - name: Execute unit tests
      run: dotnet test --configuration $CONFIGURATION --logger "trx;LogFileName=test_results.trx" --results-directory ./TestResults
    
    - name: Debug TRX location
      run: find . -name "*.trx"

    - name: Parse test results
      id: testresults
      run: |
        FILE="./TestResults/test_results.trx"
    
        if [ ! -f "$FILE" ]; then
          echo "TRX file not found!"
          echo "passed=0" >> $GITHUB_OUTPUT
          echo "failed=0" >> $GITHUB_OUTPUT
          exit 0
        fi
    
        PASSED=$(grep -oP 'passed="\K[0-9]+' "$FILE" || echo 0)
        FAILED=$(grep -oP 'failed="\K[0-9]+' "$FILE" || echo 0)
    
        echo "passed=$PASSED" >> $GITHUB_OUTPUT
        echo "failed=$FAILED" >> $GITHUB_OUTPUT

  build:
    needs: test
    runs-on: ubuntu-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on                # Replace with the path to your Wap project, i.e. MyWpf.App.Package\MyWpfApp.Package.wapproj.
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build .NET API
      run: dotnet build --configuration $CONFIGURATION --no-restore
      
    - name: Publish .NET API
      run: dotnet publish --output ./publish --no-build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: api-build
        path: ./publish

  notification:
    needs: [test, build]
    if: always()
    runs-on: ubuntu-latest
  
    steps:
    - name: Determine status
      id: status
      run: |
        TEST="${{ needs.test.result }}"
        BUILD="${{ needs.build.result }}"
  
        if [ "$TEST" = "success" ] && [ "$BUILD" = "success" ]; then
          echo "state=success" >> $GITHUB_OUTPUT
        elif [ "$TEST" = "skipped" ] || [ "$BUILD" = "skipped" ] || [ "$TEST" = "cancelled" ] || [ "$BUILD" = "cancelled" ]; then
          echo "state=skipped" >> $GITHUB_OUTPUT
        else
          echo "state=failure" >> $GITHUB_OUTPUT
        fi
  
    - name: Discord notification
      uses: tsickert/discord-webhook@v5.0.0
      with:
        webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
        embed-title: "⚒️ Build Status"
        embed-color: >-
          ${{ steps.status.outputs.state == 'success' && '0x00ff00'
              || steps.status.outputs.state == 'skipped' && '0x808080'
              || '0xff0000' }}
  
        embed-timestamp: ${{ github.event.head_commit.timestamp }}
  
        embed-description: |
          **Status:** ${
            steps.status.outputs.state == 'success' && '✅ Erfolgreich' ||
            steps.status.outputs.state == 'skipped' && '⏭ Übersprungen / Abgebrochen' ||
            '❌ Fehlgeschlagen'
          }
          **Repository:** ${{ github.repository }}
          **Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}
          **Autor:** ${{ github.actor }}
          **Tests:** ${{ needs.test.outputs.passed }} passed / ${{ needs.test.outputs.failed }} failed
          **Test Job:** ${{ needs.test.result }}
          **Build Job:** ${{ needs.build.result }}
          **Trigger:** ${{ github.event_name }}
          **Runner:** ${{ runner.os }}
          **.NET:** ${{ env.DOTNET_VERSION }}
          **Run:** [Details anzeigen](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
