services:

  db:
    image: postgres:16
    container_name: esbot-db
    restart: always
    environment:
      POSTGRES_USER: esbot
      POSTGRES_PASSWORD: esbot
      POSTGRES_DB: esbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: ESBot.API/Dockerfile
    container_name: esbot-api
    depends_on:
      - db
    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_URLS: http://0.0.0.0:8080

      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=esbot;Username=esbot;Password=esbot"

volumes:
  pgdata: